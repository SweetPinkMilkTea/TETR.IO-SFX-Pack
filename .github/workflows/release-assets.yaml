name: Upload SFX to Release

on:
  release:
    types: [published]

jobs:
  upload-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Archive sfx directory
        run: zip -r sfx-assets.zip sfx/

      - name: Upload Asset to Release
        uses: softprops/action-gh-release@v2
        with:
          files: sfx-assets.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}